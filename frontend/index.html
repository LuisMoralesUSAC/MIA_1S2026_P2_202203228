<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIA - Proyecto 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 5px;
        }
        header p {
            opacity: 0.9;
            font-size: 1.1em;
        }
        .content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #1e3c72;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-load {
            background: linear-gradient(135deg, #2196F3 0%, #00BCD4 100%);
        }
        .btn-execute {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
        }
        .output-box {
            background: #1e1e1e;
            color: #0f0;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .output-box::-webkit-scrollbar {
            width: 8px;
        }
        .output-box::-webkit-scrollbar-track {
            background: #2a2a2a;
        }
        .output-box::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ Sistema de Archivos EXT2</h1>
            <p>Manejo e Implementación de Archivos - MIA 2026</p>
        </header>
        
        <div class="content">
            <div class="section">
                <h2>📝 Área de Entrada de Comandos</h2>
                <textarea id="commandInput" placeholder="Ingrese comandos aquí...

Ejemplo:
mkdisk -size=5 -unit=M -path=~/discos/Disco1.mia
fdisk -size=3 -unit=M -path=~/discos/Disco1.mia -name=Part1
mount -path=~/discos/Disco1.mia -name=Part1"></textarea>
                
                <div class="buttons">
                    <button class="btn-load" onclick="cargarArchivo()">📁 Cargar Archivo de Script</button>
                    <button class="btn-execute" onclick="ejecutarComandos()">▶️ Ejecutar</button>
                </div>
                <input type="file" id="fileInput" accept=".smia,.txt" onchange="manejarArchivo(event)">
            </div>
            
            <div class="section">
                <h2>📤 Área de Salida de Comandos</h2>
                <div id="output" class="output-box">Esperando comandos...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        async function ejecutarComandos() {
            const comandos = document.getElementById('commandInput').value.trim();
            
            if (!comandos) {
                mostrarSalida('❌ Error: No se ingresaron comandos\n\n', true);
                return;
            }

            mostrarSalida('=== Ejecutando comandos ===\n\n', true);

            try {
                const response = await fetch(`${API_URL}/execute-script`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script: comandos })
                });

                const data = await response.json();

                if (data.results) {
                    data.results.forEach(result => {
                        mostrarSalida(`> ${result.command}\n`, false);
                        if (result.output) {
                            mostrarSalida(result.output + '\n', false);
                        }
                        if (result.error) {
                            mostrarSalida(`⚠️ ${result.error}\n`, false);
                        }
                    });
                }

                mostrarSalida('\n=== Ejecución completada ===\n', false);

            } catch (error) {
                mostrarSalida(`\n❌ Error de conexión: ${error.message}\n`, false);
                mostrarSalida('Verifique que el servidor esté corriendo en http://localhost:3000\n', false);
            }
        }

        function cargarArchivo() {
            document.getElementById('fileInput').click();
        }

        function manejarArchivo(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('commandInput').value = e.target.result;
                mostrarSalida(`✅ Archivo cargado: ${file.name}\n\n`, true);
            };
            reader.readAsText(file);
        }

        function mostrarSalida(texto, limpiar = false) {
            const output = document.getElementById('output');
            if (limpiar) {
                output.textContent = texto;
            } else {
                output.textContent += texto;
            }
            output.scrollTop = output.scrollHeight;
        }

        document.getElementById('commandInput').addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                ejecutarComandos();
            }
        });
    </script>
</body>
</html>
